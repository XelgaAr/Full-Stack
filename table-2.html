<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2</title>
    <link rel="stylesheet" href="css/table-2.css">
</head>
<body>

    <div class="table-caption">Друга таблиця, БАТЬКІВСЬКА</div>
    <table class="parent-table">
        <colgroup>
            <!-- w4 ≈ 28% -->
            <col class="col-28">
            <!-- залишкова ширина (100% - 28% - 60% = 12%) -->
            <col class="col-12">
            <!-- w3 ≈ 60% -->
            <col class="col-60">
        </colgroup>
        <tbody>
            <tr>
                <td colspan="2">1-2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>4</td>
                <td colspan="2" rowspan="2">
                    <div class="table-caption">Друга таблиця, ДОЧІРНЯ</div>
                    <table class="nested-table">
                        <tr>
                            <td>1</td>
                            <td rowspan="3">2-5-8</td>
                            <td rowspan="2">3-6</td>
                        </tr>
                        <tr>
                            <td rowspan="2" class="cell-4-7">4-7</td>
                        </tr>
                        <tr>
                            <td>9</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>7</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
