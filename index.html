<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблица Мондриана</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <table class="mondrian" aria-label="Таблица Мондриана">
    <colgroup>
      <col class="c1">
      <col class="c2">
      <col class="c3">
      <col class="c4">
      <col class="c5">
      <col class="c6">
      <col class="c7">
    </colgroup>
    <tbody>
      <tr class="r1">
        <td class="white" colspan="2"></td>
        <td class="white" colspan="2"></td>
        <td class="yellow" colspan="2"></td>
        <td class="white"></td>
      </tr>
      <tr class="r2">
        <td class="white"></td>
        <td class="red" colspan="3" rowspan="2"></td>
        <td class="yellow" colspan="2"></td>
        <td class="white" rowspan="3"></td>
      </tr>
      <tr class="r3">
        <td class="white" rowspan="2"></td>
        <td class="white"></td>
        <td class="white"></td>
      </tr>
      <tr class="r4">
        <td class="black" colspan="2" rowspan="2"></td>
        <td class="white"></td>
        <td class="white" colspan="2"></td>
      </tr>
      <tr class="r5">
        <td class="yellow" rowspan="3"></td>
        <td class="white"></td>
        <td class="blue" colspan="2" rowspan="2"></td>
        <td class="red" rowspan="3"></td>
      </tr>
      <tr class="r6">
        <td class="white" colspan="2" rowspan="2"></td>
        <td class="black"></td>
      </tr>
      <tr class="r7">
        <td class="white" colspan="3"></td>
      </tr>
    </tbody>
  </table>
  <a href="table-1.html">Перша таблиця</a>
  <a href="table-2.html">Друга таблиця</a>
</body>

</html>
